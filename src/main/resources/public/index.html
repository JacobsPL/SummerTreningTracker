<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
    <header class="app-header">
        <div class="app-title">
            <h1>Training Tracker</h1>
            <p id="statusText" class="status-text">Ładowanie...</p>
        </div>
        <button id="refreshButton" class="icon-button refresh-button" type="button" aria-label="Odśwież dane" title="Odśwież">
            <span aria-hidden="true">↻</span>
        </button>
    </header>

    <nav class="tabs" aria-label="Widoki">
        <button class="tab-button active" type="button" data-tab="todayTab">Dzisiaj / wczoraj</button>
        <button class="tab-button" type="button" data-tab="historyTab">Historia</button>
    </nav>

    <section id="todayTab" class="tab-panel active">
        <div id="peopleList" class="people-list"></div>
    </section>

    <section id="historyTab" class="tab-panel">
        <div class="history-header">
            <h2>Pełna historia</h2>
        </div>
        <div class="table-wrapper">
            <table id="historyTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="historyCards" class="history-cards"></div>
    </section>

    <p id="message" class="message"></p>
</main>

<div id="photoModal" class="photo-modal" role="dialog" aria-modal="true" aria-labelledby="photoCaption" hidden>
    <div class="photo-modal-backdrop" data-close-photo></div>
    <div class="photo-modal-content">
        <button id="closePhotoButton" class="photo-modal-close" type="button" aria-label="Zamknij zdjęcie">&times;</button>
        <figure>
            <img id="photoPreview" src="" alt="">
            <figcaption id="photoCaption"></figcaption>
        </figure>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
